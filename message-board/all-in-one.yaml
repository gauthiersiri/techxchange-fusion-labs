---
# Namespace (optional - create if needed)
apiVersion: v1
kind: Namespace
metadata:
  name: message-board
  labels:
    app: message-board

---
# ConfigMap - Non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: message-board
  labels:
    app: message-board
    component: application
data:
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_DB: messagedb
  FLASK_ENV: production
  LOG_LEVEL: INFO

---
# Secret - Sensitive credentials
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: message-board
  labels:
    app: message-board
    component: application
type: Opaque
data:
  # Base64 encoded values
  # To generate: echo -n 'your-value' | base64
  # Default values below - CHANGE THESE IN PRODUCTION!
  # POSTGRES_USER: messageuser (base64: bWVzc2FnZXVzZXI=)
  # POSTGRES_PASSWORD: SecureP@ssw0rd123 (base64: U2VjdXJlUEBzc3cwcmQxMjM=)
  # SECRET_KEY: flask-secret-key-change-me (base64: Zmxhc2stc2VjcmV0LWtleS1jaGFuZ2UtbWU=)
  POSTGRES_USER: bWVzc2FnZXVzZXI=
  POSTGRES_PASSWORD: U2VjdXJlUEBzc3cwcmQxMjM=
  SECRET_KEY: Zmxhc2stc2VjcmV0LWtleS1jaGFuZ2UtbWU=

---
# PersistentVolumeClaim - PostgreSQL storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: message-board
  labels:
    app: message-board
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: fusion3

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: message-board
  labels:
    app: message-board
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-board
      component: database
  strategy:
    type: Recreate  # Ensure only one instance runs at a time
  template:
    metadata:
      labels:
        app: message-board
        component: database
    spec:
      containers:
      - name: postgres
        image: quay.io/gauthier_siri/postgres:13-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: message-board
  labels:
    app: message-board
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: message-board
    component: database

---
# Flask Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board-app
  namespace: message-board
  labels:
    app: message-board
    component: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-board
      component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: message-board
        component: application
    spec:
      containers:
      - name: message-board-app
        image: quay.io/gauthier_siri/message-board-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # ConfigMap values
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: FLASK_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        # Secret values
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: POSTGRES_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: SECRET_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL

---
# Flask Application Service
apiVersion: v1
kind: Service
metadata:
  name: message-board-service
  namespace: message-board
  labels:
    app: message-board
    component: application
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: message-board
    component: application

---
# Route - External access
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: message-board-route
  namespace: message-board
  labels:
    app: message-board
    component: application
spec:
  to:
    kind: Service
    name: message-board-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

